## Configure memory
## ------------------------------------------------------------
## Core / Threading
## ------------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=131072
CONFIG_STATIC_INIT_GNU=y
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

## Power Management
#CONFIG_PM=y

## ------------------------------------------------------------
## USB (legacy + new USBD notes)
## ------------------------------------------------------------
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USB_CDC_ACM=n
CONFIG_USB_DEVICE_STACK=n

# Enable USB device support
#CONFIG_USBD=y

# Enable CDC ACM class (NEW API)
#CONFIG_USBD_CDC_ACM=y

# Optional descriptors
#CONFIG_USBD_MANUFACTURER="USB_Debugger_PQC_Implementation"
#CONFIG_USBD_PRODUCT="Zephyr USB"

## USB Serial / UART add-ons
# DUPLICATE: already set above with same value.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
#CONFIG_CDC_ACM_SERIAL_PID=0x0001
#CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="USBD PQC"

# Enable USB initialization at boot
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

## USB logging levels
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

## ------------------------------------------------------------
## GPIO / Pin / Peripheral buses
## ------------------------------------------------------------
CONFIG_GPIO=y

## SPI
CONFIG_SPI=n
CONFIG_SPI_STM32=n
CONFIG_DMA=n
CONFIG_SPI_STM32_DMA=n

## PWM
CONFIG_PWM=n
CONFIG_PWM_STM32=n
CONFIG_PINCTRL=y

## ------------------------------------------------------------
## Console / Serial
## ------------------------------------------------------------
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
#CONFIG_USB_UART_CONSOLE=n
#CONFIG_STDOUT_CONSOLE=y
#CONFIG_UART_LINE_CTRL=y

CONFIG_STDOUT_CONSOLE=y
# DUPLICATE: already set above with same value.
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

## ------------------------------------------------------------
## Logging / RTT
## ------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y

## SEGGER RTT logging
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=n
CONFIG_PRINTK=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_MODE_BLOCK=y

# DUPLICATE: already set above with same value.
CONFIG_LOG=y

## ------------------------------------------------------------
## Events
## ------------------------------------------------------------
CONFIG_EVENTS=y

## ------------------------------------------------------------
## Display / Flash / Regulator / LVGL
## ------------------------------------------------------------
CONFIG_DISPLAY=n
CONFIG_FLASH=n

# DUPLICATE: already set above with same value.
CONFIG_SPI=n

## Enable regulator framework for LCD backlight
CONFIG_REGULATOR=n

## LVGL
CONFIG_LVGL=n
CONFIG_LV_USE_LABEL=n
CONFIG_LV_USE_LOG=n

CONFIG_LV_COLOR_DEPTH_16=n
CONFIG_LV_FONT_MONTSERRAT_18=n
#CONFIG_LV_Z_MEM_POOL_SIZE=n
##16384
## important to swap upper and lower bytes of the pixels
CONFIG_LV_COLOR_16_SWAP=n

CONFIG_LV_USE_BUTTON=n
CONFIG_LV_USE_ARC=n
CONFIG_LV_USE_IMAGE=n

## ------------------------------------------------------------
## Ethernet / Networking (currently commented)
## ------------------------------------------------------------
